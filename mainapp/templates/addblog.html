{% extends 'adminbase.html' %}
{% load static %}

{% block title %}
Add Blog
{% endblock %}

{% block admin %}

<style>
    /* Page Heading */

    .page-title {
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 30px;

        background: linear-gradient(90deg, #6366f1, #ec4899);
        -webkit-background-clip: text;
        color: transparent;
    }

    /* Form Card */

    .blog-form {
        background: white;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
        max-width: 500px;
        margin: auto;
        animation: fadeUp 0.6s ease;
    }

    /* Django form inputs */

    .blog-form input,
    .blog-form textarea,
    .blog-form select {
        width: 100%;
        border-radius: 6px;
        border: 1px solid #ddd;
        padding: 10px;
        margin-bottom: 15px;
        transition: 0.3s;
    }

    .blog-form input:focus,
    .blog-form textarea:focus {
        border-color: #6366f1;
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.25);
        outline: none;
    }

    /* Submit Button */

    .submit-btn {
        background: linear-gradient(45deg, #6366f1, #ec4899);
        border: none;
        color: white;
        font-weight: 600;
        padding: 10px;
        border-radius: 6px;
        transition: 0.3s;
        width: 100%;
    }

    .submit-btn:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
    }

    /* Animation */

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>


<h2 class="page-title">Add New Blog</h2>

<div class="blog-form">

    <form action="" method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{data}}

        <button type="submit" class="btn submit-btn mt-2">
            Publish Blog
        </button>

    </form>

</div>

{% endblock %}
