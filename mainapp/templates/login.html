{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block data %}

<style>
    .login-wrapper {
        min-height: 80vh;
        background: #f8f9ff;
    }

    .login-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        animation: fadeUp 0.8s ease;
    }

    .login-title {
        font-size: clamp(1.5rem, 4vw, 1.9rem);
        font-weight: 700;
        background: linear-gradient(90deg, #6366f1, #ec4899);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        line-height: 1.3;
    }

    label {
        font-weight: 500;
        color: #444;
    }

    .form-control {
        border-radius: 6px;
        border: 1px solid #ddd;
        padding: 10px;
        transition: 0.3s;
    }

    .form-control:focus {
        border-color: #6366f1;
        box-shadow: 0 0 8px rgba(99, 102, 241, 0.25);
    }

    .login-btn {
        background: linear-gradient(45deg, #6366f1, #ec4899);
        color: white;
        border: none;
        font-weight: 600;
        border-radius: 6px;
        transition: 0.3s;
    }

    .login-btn:hover {
        transform: scale(1.04);
        box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        color: white;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="login-wrapper d-flex align-items-center justify-content-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-9 col-md-7 col-lg-6 col-xl-5">

                <div class="login-card p-4 p-sm-5">

                    <h2 class="login-title text-center mb-4">Login to Blogify</h2>

                    <form action="" method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn login-btn py-2">Login</button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
